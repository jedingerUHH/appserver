<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Poke-Mathe</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game {
      width: 100%;
      max-width: 1100px;
      padding: 10px 20px;
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 10px;
    }

    .setup-topbar {
      margin-bottom: 0;
    }

    .small-button {
      font-size: 1.15rem;
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      color: white;
      background: linear-gradient(#68c64a, #289313);
      box-shadow: 0 4px 0 #17640d;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .small-button.orange {
      background: linear-gradient(#ff8a4b, #d94a18);
      box-shadow: 0 4px 0 #9c2e0c;
    }

    .setup {
      background: #1d1d1d;
      border-radius: 28px;
      padding: 25px;
      box-shadow: 0 8px 0 #000;
    }

    .setup h1 {
      font-size: 3.2rem;
      margin: 0 0 20px;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      text-align: left;
      margin-bottom: 22px;
    }

    .setting {
      background: #2b2b2b;
      border-radius: 18px;
      padding: 16px;
    }

    .setting label {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .operation-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .operation-button {
      font-size: 2.5rem;
      padding: 12px 0;
      border-radius: 16px;
      background: linear-gradient(#555, #333);
      box-shadow: 0 5px 0 #111;
    }

    .operation-button.selected {
      background: linear-gradient(#c045b7, #9d168e);
      box-shadow: 0 5px 0 #6f0c66;
    }

    input {
      width: 100%;
      font-size: 2rem;
      padding: 10px;
      border-radius: 14px;
      border: none;
      text-align: center;
      background: white;
      color: #111;
    }

    .start-button {
      width: 100%;
      font-size: 3rem;
      border: none;
      border-radius: 22px;
      padding: 16px 0;
      color: white;
      background: linear-gradient(#68c64a, #289313);
      box-shadow: 0 7px 0 #17640d;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .task {
      display: inline-block;
      font-size: 4.6rem;
      padding: 16px 55px;
      margin-bottom: 8px;
      background: linear-gradient(#c045b7, #9d168e);
      border-radius: 24px;
      box-shadow: 0 5px 0 #6f0c66;
    }

    .progress {
      font-size: 1.6rem;
      color: #ddd;
      min-width: 160px;
      text-align: center;
    }

    .score {
      font-size: 1.6rem;
      color: #ddd;
      min-width: 160px;
      text-align: right;
    }

    .status {
      min-height: 105px;
    }

    .answer {
      font-size: 3.6rem;
      min-height: 58px;
      margin: 4px 0;
      color: #fff;
    }

    .message {
      font-size: 2.2rem;
      min-height: 42px;
      margin: 2px 0 8px;
      font-weight: bold;
    }

    .message.correct {
      color: #58e058;
    }

    .message.wrong {
      color: #ff5555;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    button {
      font-size: 3rem;
      border: none;
      border-radius: 18px;
      padding: 11px 0;
      color: white;
      background: linear-gradient(#39b5e8, #0097cf);
      box-shadow: 0 5px 0 #006b93;
      cursor: pointer;
    }

    button:active,
    .small-button:active,
    .start-button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #006b93;
    }

    .control {
      background: linear-gradient(#68c64a, #289313);
      box-shadow: 0 5px 0 #17640d;
    }

    .delete {
      background: linear-gradient(#ff8a4b, #d94a18);
      box-shadow: 0 5px 0 #9c2e0c;
    }

    .result {
      background: #1d1d1d;
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 8px 0 #000;
    }

    .result h1 {
      font-size: 4rem;
      margin: 0 0 20px;
    }

    .result p {
      font-size: 2.5rem;
      margin: 15px 0;
    }

    .reward {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0 15px;
    }

    .reward img {
      max-height: 260px;
      max-width: 260px;
      width: auto;
      height: auto;
      image-rendering: auto;
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.6));
    }

    .collection-screen {
      background: #1d1d1d;
      border-radius: 28px;
      padding: 25px;
      box-shadow: 0 8px 0 #000;
      max-height: 94vh;
      display: flex;
      flex-direction: column;
    }

    .collection-screen h1 {
      font-size: 3.4rem;
      margin: 0 0 10px;
    }

    .collection-screen p {
      font-size: 1.8rem;
      margin: 8px 0 16px;
    }

    .collection-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      gap: 14px;
      padding: 8px;
      margin-bottom: 18px;
      background: #111;
      border-radius: 18px;
    }

    .collection-item {
      background: #2b2b2b;
      border-radius: 16px;
      padding: 8px;
      text-align: center;
    }

    .collection-item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.5));
    }

    .collection-number {
      font-size: 1rem;
      color: #ddd;
      margin-top: 4px;
    }

    .collection-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .empty-collection {
      font-size: 2rem;
      color: #ddd;
      padding: 30px;
      grid-column: 1 / -1;
    }

    .hidden {
      display: none;
    }

    .flash-correct {
      animation: flashGreen 0.5s;
    }

    .flash-wrong {
      animation: flashRed 0.5s;
    }

    @keyframes flashGreen {
      0% { background: #111; }
      50% { background: #145f14; }
      100% { background: #111; }
    }

    @keyframes flashRed {
      0% { background: #111; }
      50% { background: #6f1111; }
      100% { background: #111; }
    }

    @media (max-height: 650px) {
      .game {
        padding: 6px 16px;
      }

      .small-button {
        font-size: 1rem;
        padding: 6px 12px;
      }

      .setup {
        padding: 14px;
      }

      .setup h1 {
        font-size: 2.3rem;
        margin-bottom: 10px;
      }

      .setup-grid {
        gap: 10px;
        margin-bottom: 12px;
      }

      .setting {
        padding: 10px;
      }

      .setting label {
        font-size: 1.1rem;
        margin-bottom: 6px;
      }

      input {
        font-size: 1.5rem;
        padding: 7px;
      }

      .operation-button {
        font-size: 1.9rem;
        padding: 7px 0;
      }

      .start-button {
        font-size: 2.2rem;
        padding: 10px 0;
      }

      .task {
        font-size: 3.8rem;
        padding: 10px 42px;
        margin-bottom: 4px;
        border-radius: 20px;
      }

      .progress,
      .score {
        font-size: 1.2rem;
        min-width: 100px;
      }

      .status {
        min-height: 82px;
      }

      .answer {
        font-size: 3rem;
        min-height: 46px;
        margin: 2px 0;
      }

      .message {
        font-size: 1.8rem;
        min-height: 32px;
        margin: 2px 0 6px;
      }

      button {
        font-size: 2.5rem;
        padding: 8px 0;
        border-radius: 15px;
      }

      .buttons {
        gap: 8px;
      }

      .result {
        padding: 18px;
      }

      .result h1 {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      .result p {
        font-size: 2rem;
        margin: 8px 0;
      }

      .reward img {
        max-height: 160px;
        max-width: 160px;
      }

      .collection-screen {
        padding: 14px;
      }

      .collection-screen h1 {
        font-size: 2.5rem;
      }

      .collection-screen p {
        font-size: 1.3rem;
        margin: 4px 0 8px;
      }

      .collection-grid {
        grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .collection-item img {
        width: 58px;
        height: 58px;
      }

      .collection-number {
        font-size: 0.8rem;
      }

      .collection-actions {
        gap: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="game">

    <div id="setupScreen" class="setup">
      <div class="topbar setup-topbar">
        <a class="small-button orange" href="index.html">Zurück</a>
        <button class="small-button" onclick="showCollection()">Sammlung</button>
        <button class="small-button" onclick="goFullscreen()">Vollbild</button>
      </div>

      <h1>Poke-Mathe</h1>

      <div class="setup-grid">
        <div class="setting">
          <label>Rechenart</label>
          <div class="operation-buttons">
            <button id="opPlus" class="operation-button selected" onclick="selectOperation('+')">+</button>
            <button id="opMinus" class="operation-button" onclick="selectOperation('-')">−</button>
            <button id="opMultiply" class="operation-button" onclick="selectOperation('*')">×</button>
            <button id="opDivide" class="operation-button" onclick="selectOperation('/')">÷</button>
          </div>
        </div>

        <div class="setting">
          <label for="roundsInput">Runden</label>
          <input id="roundsInput" type="number" min="10" max="10" value="10">
        </div>

        <div class="setting">
          <label for="minInput">Kleinste Zahl</label>
          <input id="minInput" type="number" min="0" max="999" value="1">
        </div>

        <div class="setting">
          <label for="maxInput">Größte Zahl</label>
          <input id="maxInput" type="number" min="1" max="999" value="10">
        </div>
      </div>

      <button class="start-button" onclick="startGame()">Start</button>
    </div>

    <div id="gameScreen" class="hidden">
      <div class="topbar">
        <a class="small-button orange" href="index.html">Zurück</a>
        <div id="progress" class="progress">Runde 1 / 10</div>
        <button class="small-button" onclick="goFullscreen()">Vollbild</button>
        <div id="score" class="score">Richtig: 0</div>
      </div>

      <div id="task" class="task">4 × 5</div>

      <div class="status">
        <div id="answer" class="answer">?</div>
        <div id="message" class="message"></div>
      </div>

      <div class="buttons">
        <button onclick="addDigit(1)">1</button>
        <button onclick="addDigit(2)">2</button>
        <button onclick="addDigit(3)">3</button>
        <button onclick="addDigit(4)">4</button>
        <button onclick="addDigit(5)">5</button>

        <button onclick="addDigit(6)">6</button>
        <button onclick="addDigit(7)">7</button>
        <button onclick="addDigit(8)">8</button>
        <button onclick="addDigit(9)">9</button>
        <button onclick="addDigit(0)">0</button>

        <button class="delete" onclick="clearAnswer()">←</button>
        <button class="control" style="grid-column: span 4;" onclick="checkAnswer()">Los!</button>
      </div>
    </div>

    <div id="resultScreen" class="result hidden">
      <h1>Geschafft! 🎉</h1>

      <div class="reward">
        <img id="pokemonReward" src="" alt="Pokémon-Belohnung">
      </div>

      <p id="finalScore">Du hast 0 von 10 richtig.</p>
      <p id="finalComment">Gut gemacht!</p>

      <button class="start-button" onclick="showSetup()">Neue Runde</button>
    </div>

    <div id="collectionScreen" class="collection-screen hidden">
      <div class="topbar setup-topbar">
        <button class="small-button" onclick="showSetup()">Zurück</button>
        <button class="small-button" onclick="goFullscreen()">Vollbild</button>
      </div>

      <h1>Meine Sammlung</h1>
      <p id="collectionCount">0 von 1025 Pokémon gesammelt</p>

      <div id="collectionGrid" class="collection-grid"></div>

      <div class="collection-actions">
        <button class="small-button orange" onclick="clearCollection()">Sammlung löschen</button>
        <button class="small-button" onclick="showSetup()">Weiter üben</button>
      </div>
    </div>

  </div>

  <script>
    const COLLECTION_STORAGE_KEY = "pokemonCollection";

    let selectedOperation = "+";

    let minNumber = 1;
    let maxNumber = 10;
    let totalRounds = 10;

    let currentRound = 1;
    let correctCount = 0;

    let numberA;
    let numberB;
    let correctResult;
    let answerLocked = false;
    let resultShown = false;

    function selectOperation(operation) {
      selectedOperation = operation;

      document.getElementById("opPlus").classList.remove("selected");
      document.getElementById("opMinus").classList.remove("selected");
      document.getElementById("opMultiply").classList.remove("selected");
      document.getElementById("opDivide").classList.remove("selected");

      if (operation === "+") {
        document.getElementById("opPlus").classList.add("selected");
      } else if (operation === "-") {
        document.getElementById("opMinus").classList.add("selected");
      } else if (operation === "*") {
        document.getElementById("opMultiply").classList.add("selected");
      } else if (operation === "/") {
        document.getElementById("opDivide").classList.add("selected");
      }
    }

    function startGame() {
      minNumber = Number(document.getElementById("minInput").value);
      maxNumber = Number(document.getElementById("maxInput").value);
      totalRounds = 10;

      if (Number.isNaN(minNumber)) minNumber = 1;
      if (Number.isNaN(maxNumber)) maxNumber = 10;
      if (Number.isNaN(totalRounds)) totalRounds = 10;

      minNumber = Math.max(0, Math.floor(minNumber));
      maxNumber = Math.max(1, Math.floor(maxNumber));
      totalRounds = Math.max(1, Math.floor(totalRounds));

      if (minNumber > maxNumber) {
        const temp = minNumber;
        minNumber = maxNumber;
        maxNumber = temp;
      }

      if (selectedOperation === "/" && minNumber === 0 && maxNumber === 0) {
        maxNumber = 10;
      }

      currentRound = 1;
      correctCount = 0;
      resultShown = false;
      answerLocked = false;

      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("collectionScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.remove("hidden");

      newTask();
    }

    function showSetup() {
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("collectionScreen").classList.add("hidden");
      document.getElementById("setupScreen").classList.remove("hidden");
    }

    function newTask() {
      answerLocked = false;
      currentAnswer = "";

      if (selectedOperation === "+") {
        createAdditionTask();
      } else if (selectedOperation === "-") {
        createSubtractionTask();
      } else if (selectedOperation === "*") {
        createMultiplicationTask();
      } else if (selectedOperation === "/") {
        createDivisionTask();
      }

      document.getElementById("answer").textContent = "?";

      const message = document.getElementById("message");
      message.textContent = "";
      message.className = "message";

      updateTopbar();
    }

    function createAdditionTask() {
      numberA = randomNumber(minNumber, maxNumber);
      numberB = randomNumber(minNumber, maxNumber);
      correctResult = numberA + numberB;

      document.getElementById("task").textContent = numberA + " + " + numberB;
    }

    function createSubtractionTask() {
      numberA = randomNumber(minNumber, maxNumber);
      numberB = randomNumber(minNumber, maxNumber);

      if (numberB > numberA) {
        const temp = numberA;
        numberA = numberB;
        numberB = temp;
      }

      correctResult = numberA - numberB;

      document.getElementById("task").textContent = numberA + " − " + numberB;
    }

    function createMultiplicationTask() {
      numberA = randomNumber(minNumber, maxNumber);
      numberB = randomNumber(minNumber, maxNumber);
      correctResult = numberA * numberB;

      document.getElementById("task").textContent = numberA + " × " + numberB;
    }

    function createDivisionTask() {
      let divisorMin = Math.max(1, minNumber);
      let divisorMax = Math.max(1, maxNumber);

      numberB = randomNumber(divisorMin, divisorMax);
      correctResult = randomNumber(minNumber, maxNumber);
      numberA = numberB * correctResult;

      document.getElementById("task").textContent = numberA + " ÷ " + numberB;
    }

    function updateTopbar() {
      document.getElementById("progress").textContent =
        "Runde " + currentRound + " / " + totalRounds;

      document.getElementById("score").textContent =
        "Richtig: " + correctCount;
    }

    function randomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function addDigit(digit) {
      if (answerLocked) return;
      if (currentAnswer.length >= 8) return;

      currentAnswer += digit;
      document.getElementById("answer").textContent = currentAnswer;
    }

    function clearAnswer() {
      if (answerLocked) return;

      currentAnswer = currentAnswer.slice(0, -1);
      document.getElementById("answer").textContent = currentAnswer || "?";
    }

    function checkAnswer() {
      if (answerLocked) return;

      const message = document.getElementById("message");
      const givenAnswer = Number(currentAnswer);

      document.body.classList.remove("flash-correct", "flash-wrong");

      if (currentAnswer === "") {
        message.textContent = "Bitte Zahl eingeben";
        message.className = "message wrong";
        return;
      }

      answerLocked = true;

      if (givenAnswer === correctResult) {
        correctCount++;

        message.textContent = "Richtig! 🎉";
        message.className = "message correct";

        document.body.classList.add("flash-correct");

        setTimeout(() => {
          document.body.classList.remove("flash-correct");
          nextRound();
        }, 900);
      } else {
        message.textContent = "Leider falsch. Richtig wäre " + correctResult;
        message.className = "message wrong";

        document.body.classList.add("flash-wrong");

        setTimeout(() => {
          document.body.classList.remove("flash-wrong");
          nextRound();
        }, 1600);
      }
    }

    function nextRound() {
      if (resultShown) {
        return;
      }
    
      if (currentRound >= totalRounds) {
        showResult();
      } else {
        currentRound++;
        newTask();
      }
    }

    function showResult() {
      if (resultShown) {
        return;
      }
    
      resultShown = true;
      answerLocked = true;
    
      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");
    
      showPokemonReward();
    
      document.getElementById("finalScore").textContent =
        "Du hast " + correctCount + " von " + totalRounds + " richtig.";
    
      const percentage = correctCount / totalRounds;
    
      let comment = "Gut gemacht!";
    
      if (percentage === 1) {
        comment = "Alles richtig! Super! 🏆";
      } else if (percentage >= 0.8) {
        comment = "Sehr stark! ⭐";
      } else if (percentage >= 0.5) {
        comment = "Gut gemacht! Weiter so!";
      } else {
        comment = "Das üben wir einfach nochmal.";
      }
    
      document.getElementById("finalComment").textContent = comment;
    }

    function showPokemonReward() {
      const pokemonNumber = randomNumber(1, 1025);
      const paddedNumber = padPokemonNumber(pokemonNumber);

      const imageUrl = getPokemonImageUrl(pokemonNumber);
      const image = document.getElementById("pokemonReward");

      image.src = imageUrl;
      image.alt = "Pokémon Nummer " + paddedNumber;

      savePokemonToCollection(pokemonNumber);
    }

    function padPokemonNumber(pokemonNumber) {
      return String(pokemonNumber).padStart(3, "0");
    }

    function getPokemonImageUrl(pokemonNumber) {
      return "https://db.pokemongohub.net/images/official/full/" +
        padPokemonNumber(pokemonNumber) +
        ".webp";
    }

    function getPokemonCollection() {
      const saved = localStorage.getItem(COLLECTION_STORAGE_KEY);

      if (!saved) {
        return [];
      }

      try {
        const parsed = JSON.parse(saved);

        if (Array.isArray(parsed)) {
          return parsed
            .map(Number)
            .filter(number => Number.isInteger(number) && number >= 1 && number <= 1025);
        }

        return [];
      } catch {
        return [];
      }
    }

    function savePokemonToCollection(pokemonNumber) {
      const collection = getPokemonCollection();

      if (!collection.includes(pokemonNumber)) {
        collection.push(pokemonNumber);
        collection.sort((a, b) => a - b);
        localStorage.setItem(COLLECTION_STORAGE_KEY, JSON.stringify(collection));
      }
    }

    function showCollection() {
      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("collectionScreen").classList.remove("hidden");

      renderCollection();
    }

    function renderCollection() {
      const collection = getPokemonCollection();
      const grid = document.getElementById("collectionGrid");
      const count = document.getElementById("collectionCount");

      count.textContent = collection.length + " von 1025 Pokémon gesammelt";
      grid.innerHTML = "";

      if (collection.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-collection";
        empty.textContent = "Noch keine Pokémon gesammelt.";
        grid.appendChild(empty);
        return;
      }

      collection.forEach(pokemonNumber => {
        const item = document.createElement("div");
        item.className = "collection-item";

        const image = document.createElement("img");
        image.src = getPokemonImageUrl(pokemonNumber);
        image.alt = "Pokémon Nummer " + padPokemonNumber(pokemonNumber);

        const label = document.createElement("div");
        label.className = "collection-number";
        label.textContent = "#" + padPokemonNumber(pokemonNumber);

        item.appendChild(image);
        item.appendChild(label);
        grid.appendChild(item);
      });
    }

    function clearCollection() {
      const reallyDelete = confirm("Soll die Pokémon-Sammlung wirklich gelöscht werden?");

      if (!reallyDelete) {
        return;
      }

      localStorage.removeItem(COLLECTION_STORAGE_KEY);
      renderCollection();
    }

    function goFullscreen() {
      const element = document.documentElement;

      if (element.requestFullscreen) {
        element.requestFullscreen();
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      }
    }
  </script>
</body>
</html>
