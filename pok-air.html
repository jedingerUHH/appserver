<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pok-Air</title>

  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .small-button {
      font-size: 1.05rem;
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      color: white;
      background: linear-gradient(#68c64a, #289313);
      box-shadow: 0 4px 0 #17640d;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .small-button.orange {
      background: linear-gradient(#ff8a4b, #d94a18);
      box-shadow: 0 4px 0 #9c2e0c;
    }

    .setup {
      width: min(1050px, calc(100vw - 32px));
      margin: 20px auto;
      background: #1d1d1d;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 8px 0 #000;
      text-align: center;
    }

    .setup h1 {
      font-size: 4rem;
      margin: 0 0 10px;
    }

    .setup p {
      font-size: 1.4rem;
      color: #ddd;
      margin: 0 0 22px;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      text-align: left;
      margin-bottom: 22px;
    }

    .setting {
      background: #2b2b2b;
      border-radius: 18px;
      padding: 16px;
    }

    .setting label {
      display: block;
      font-size: 1.3rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      font-size: 2rem;
      padding: 10px;
      border-radius: 14px;
      border: none;
      text-align: center;
      background: white;
      color: #111;
    }

    .start-button {
      width: 100%;
      font-size: 3rem;
      border: none;
      border-radius: 22px;
      padding: 16px 0;
      color: white;
      background: linear-gradient(#68c64a, #289313);
      box-shadow: 0 7px 0 #17640d;
      cursor: pointer;
    }

    .game-screen {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(20, 20, 20, 0.9), #050505 65%),
        #000;
    }

    .game-topbar {
      position: absolute;
      top: 10px;
      left: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .game-topbar .small-button,
    .game-topbar .stats {
      pointer-events: auto;
    }

    .stats {
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(20, 20, 20, 0.78);
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 1.1rem;
      color: #eee;
    }

    .target-number {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: min(36vw, 28rem);
      font-weight: bold;
      color: rgba(255, 255, 255, 0.08);
      z-index: 1;
      pointer-events: none;
    }

    .playfield {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 5;
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 70px;
      height: 72px;
      background:
        linear-gradient(45deg, #ef6b16 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(-45deg, #ef6b16 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, #9f3b0a 75%) 0 0 / 24px 24px,
        linear-gradient(-45deg, transparent 75%, #9f3b0a 75%) 0 0 / 24px 24px,
        #c74f12;
      border-top: 3px solid #ff9b42;
      z-index: 3;
      opacity: 0.9;
    }

    .balloon {
      position: absolute;
      width: 126px;
      height: 170px;
      z-index: 20;
      cursor: pointer;
      animation-name: floatUp;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    .balloon-body {
      position: absolute;
      left: 14px;
      top: 0;
      width: 98px;
      height: 122px;
      border-radius: 54% 54% 50% 50%;
      background: radial-gradient(circle at 32% 22%, #ff7070 0 18%, #ff242d 19% 48%, #d50f19 80%);
      border: 3px solid #1a1a1a;
      box-shadow: inset -10px -16px 0 rgba(120, 0, 0, 0.25), 0 8px 12px rgba(0, 0, 0, 0.35);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .balloon-body::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 12px;
      width: 18px;
      height: 50px;
      border-left: 7px solid white;
      border-radius: 50%;
      transform: rotate(35deg);
      opacity: 0.95;
    }

    .balloon-knot {
      position: absolute;
      left: 54px;
      top: 118px;
      width: 20px;
      height: 14px;
      background: #d50f19;
      border: 3px solid #1a1a1a;
      border-radius: 6px;
    }

    .balloon-string {
      position: absolute;
      left: 63px;
      top: 130px;
      width: 20px;
      height: 42px;
      border-left: 3px solid #d6d6d6;
      border-radius: 50%;
      transform: rotate(-16deg);
      opacity: 0.9;
    }

    .balloon-task {
      position: relative;
      z-index: 2;
      color: #050505;
      font-size: 1.3rem;
      font-weight: bold;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
      padding-top: 12px;
    }

    .balloon.pop {
      animation: popBalloon 0.25s forwards !important;
    }

    .pokemon-drop {
      position: absolute;
      width: 84px;
      height: 84px;
      object-fit: contain;
      z-index: 30;
      pointer-events: none;
      animation: pokemonFall 1.1s ease-in forwards;
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.6));
    }

    .floating-message {
      position: absolute;
      z-index: 120;
      left: 50%;
      top: 82px;
      transform: translateX(-50%);
      font-size: 2.1rem;
      font-weight: bold;
      min-height: 48px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 3px 5px rgba(0, 0, 0, 0.9);
    }

    .floating-message.good {
      color: #58e058;
    }

    .floating-message.bad {
      color: #ff5555;
    }

    .result {
      width: min(760px, calc(100vw - 32px));
      margin: 40px auto;
      background: #1d1d1d;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 8px 0 #000;
      text-align: center;
    }

    .result h1 {
      font-size: 3.8rem;
      margin: 0 0 18px;
    }

    .result p {
      font-size: 2rem;
      margin: 12px 0;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-125vh);
      }
    }

    @keyframes popBalloon {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.25);
        opacity: 0.8;
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    @keyframes pokemonFall {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(260px) scale(1);
        opacity: 0;
      }
    }

    @media (max-height: 720px) {
      .setup {
        margin: 10px auto;
        padding: 18px;
      }

      .setup h1 {
        font-size: 2.8rem;
      }

      .setup p {
        font-size: 1.1rem;
        margin-bottom: 14px;
      }

      .setup-grid {
        gap: 12px;
        margin-bottom: 14px;
      }

      .setting {
        padding: 12px;
      }

      .setting label {
        font-size: 1rem;
        margin-bottom: 6px;
      }

      input {
        font-size: 1.5rem;
        padding: 7px;
      }

      .start-button {
        font-size: 2.2rem;
        padding: 10px 0;
      }

      .small-button {
        font-size: 0.9rem;
        padding: 6px 12px;
      }

      .stats {
        font-size: 0.9rem;
        padding: 6px 10px;
      }

      .floating-message {
        top: 58px;
        font-size: 1.6rem;
      }

      .balloon {
        width: 105px;
        height: 142px;
      }

      .balloon-body {
        left: 12px;
        width: 82px;
        height: 102px;
      }

      .balloon-knot {
        left: 45px;
        top: 99px;
      }

      .balloon-string {
        left: 54px;
        top: 111px;
      }

      .balloon-task {
        font-size: 1.05rem;
      }

      .pokemon-drop {
        width: 66px;
        height: 66px;
      }

      .ground {
        bottom: 52px;
        height: 54px;
      }

      .result {
        margin: 20px auto;
        padding: 20px;
      }

      .result h1 {
        font-size: 2.8rem;
      }

      .result p {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <section id="setupScreen" class="setup">
      <div class="topbar">
        <a class="small-button orange" href="index.html">Zurück</a>
        <button class="small-button" onclick="goFullscreen()">Vollbild</button>
      </div>

      <h1>Pok-Air</h1>
      <p>Klicke die Ballons an, deren Aufgabe zur großen Zahl passt.</p>

      <div class="setup-grid">
        <div class="setting">
          <label for="roundsInput">Runden</label>
          <input id="roundsInput" type="number" min="1" max="50" value="5">
        </div>

        <div class="setting">
          <label for="minInput">Kleinste Zahl</label>
          <input id="minInput" type="number" min="0" max="999" value="1">
        </div>

        <div class="setting">
          <label for="maxInput">Größte Zahl</label>
          <input id="maxInput" type="number" min="5" max="999" value="100">
        </div>
      </div>

      <button class="start-button" onclick="startGame()">Start</button>
    </section>

    <section id="gameScreen" class="game-screen hidden">
      <div class="target-number" id="targetNumber">50</div>

      <div class="game-topbar">
        <a class="small-button orange" href="index.html">Zurück</a>

        <div class="stats">
          <div id="roundDisplay">Runde 1 / 5</div>
          <div id="hitDisplay">Richtig: 0</div>
          <div id="errorDisplay">Fehler: 0</div>
        </div>

        <button class="small-button" onclick="goFullscreen()">Vollbild</button>
      </div>

      <div id="floatingMessage" class="floating-message"></div>
      <div id="playfield" class="playfield"></div>
      <div class="ground"></div>
    </section>

    <section id="resultScreen" class="result hidden">
      <h1>Fertig! 🎈</h1>
      <p id="finalHits">Richtig: 0</p>
      <p id="finalErrors">Fehler: 0</p>
      <p id="finalComment">Gut gemacht!</p>
      <button class="start-button" onclick="showSetup()">Neue Runde</button>
    </section>

  </div>

  <script>
    const COLLECTION_STORAGE_KEY = "pokemonCollection";
    const NUMBER_OF_POKEMON = 1025;
    const BALLOONS_PER_ROUND = 10;
    const MIN_CORRECT_BALLOONS = 3;

    let totalRounds = 5;
    let currentRound = 1;
    let minNumber = 1;
    let maxNumber = 100;

    let targetValue = 50;
    let activeBalloons = [];
    let balloonsGoneThisRound = 0;
    let correctRemainingThisRound = 0;

    let totalHits = 0;
    let totalErrors = 0;
    let roundRunning = false;

    function startGame() {
      totalRounds = Number(document.getElementById("roundsInput").value);
      minNumber = Number(document.getElementById("minInput").value);
      maxNumber = Number(document.getElementById("maxInput").value);

      if (Number.isNaN(totalRounds)) totalRounds = 5;
      if (Number.isNaN(minNumber)) minNumber = 1;
      if (Number.isNaN(maxNumber)) maxNumber = 100;

      totalRounds = Math.max(1, Math.floor(totalRounds));
      minNumber = Math.max(0, Math.floor(minNumber));
      maxNumber = Math.max(5, Math.floor(maxNumber));

      if (minNumber > maxNumber) {
        const temp = minNumber;
        minNumber = maxNumber;
        maxNumber = temp;
      }

      currentRound = 1;
      totalHits = 0;
      totalErrors = 0;

      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.remove("hidden");

      startRound();
    }

    function showSetup() {
      stopRound();

      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("setupScreen").classList.remove("hidden");
    }

    function startRound() {
      roundRunning = true;
      balloonsGoneThisRound = 0;
      activeBalloons = [];

      const playfield = document.getElementById("playfield");
      playfield.innerHTML = "";

      clearMessage();

      targetValue = randomNumber(Math.max(2, minNumber), maxNumber);
      document.getElementById("targetNumber").textContent = targetValue;

      const numberOfCorrect = randomNumber(MIN_CORRECT_BALLOONS, BALLOONS_PER_ROUND - 2);
      correctRemainingThisRound = numberOfCorrect;

      const tasks = createTasksForRound(targetValue, numberOfCorrect);
      shuffle(tasks);

      tasks.forEach((task, index) => {
        createBalloon(task, index);
      });

      updateStats();
    }

    function stopRound() {
      roundRunning = false;

      activeBalloons.forEach(balloon => {
        balloon.remove();
      });

      activeBalloons = [];

      const playfield = document.getElementById("playfield");
      playfield.innerHTML = "";
    }

    function createTasksForRound(target, numberOfCorrect) {
      const tasks = [];

      for (let i = 0; i < numberOfCorrect; i++) {
        tasks.push(createCorrectTask(target));
      }

      while (tasks.length < BALLOONS_PER_ROUND) {
        const wrongTask = createWrongTask(target);

        tasks.push(wrongTask);
      }

      return tasks;
    }

    function createCorrectTask(target) {
      const usePlus = Math.random() < 0.5;

      if (usePlus && target > 0) {
        const a = randomNumber(0, target);
        const b = target - a;
        return {
          text: a + "+" + b,
          value: target,
          correct: true
        };
      }

      const b = randomNumber(0, maxNumber);
      const a = target + b;

      return {
        text: a + "-" + b,
        value: target,
        correct: true
      };
    }

    function createWrongTask(target) {
      let task;
      let safety = 0;

      do {
        const usePlus = Math.random() < 0.5;

        if (usePlus) {
          const a = randomNumber(minNumber, maxNumber);
          const b = randomNumber(minNumber, maxNumber);
          task = {
            text: a + "+" + b,
            value: a + b,
            correct: false
          };
        } else {
          const a = randomNumber(minNumber, maxNumber);
          const b = randomNumber(minNumber, maxNumber);
          const larger = Math.max(a, b);
          const smaller = Math.min(a, b);

          task = {
            text: larger + "-" + smaller,
            value: larger - smaller,
            correct: false
          };
        }

        safety++;
      } while (task.value === target && safety < 100);

      if (task.value === target) {
        task.value = target + 1;
        task.text = (target + 1) + "+0";
      }

      return task;
    }

    function createBalloon(task, index) {
      const playfield = document.getElementById("playfield");

      const balloon = document.createElement("div");
      balloon.className = "balloon";
      balloon.dataset.correct = task.correct ? "true" : "false";
      balloon.dataset.done = "false";

      const x = getBalloonXPosition(index);
      const delay = index * 0.7 + randomNumber(0, 6) / 10;
      const duration = randomNumber(105, 145) / 10;

      balloon.style.left = x + "%";
      balloon.style.bottom = "-190px";
      balloon.style.animationDuration = duration + "s";
      balloon.style.animationDelay = delay + "s";

      balloon.innerHTML = `
        <div class="balloon-body">
          <div class="balloon-task">${task.text}</div>
        </div>
        <div class="balloon-knot"></div>
        <div class="balloon-string"></div>
      `;

      balloon.addEventListener("click", () => handleBalloonClick(balloon));
      balloon.addEventListener("animationend", () => handleBalloonEscaped(balloon));

      playfield.appendChild(balloon);
      activeBalloons.push(balloon);
    }

    function getBalloonXPosition(index) {
      const basePositions = [8, 20, 32, 44, 56, 68, 80, 14, 38, 72];
      const jitter = randomNumber(-4, 4);
      return Math.min(88, Math.max(2, basePositions[index] + jitter));
    }

    function handleBalloonClick(balloon) {
      if (!roundRunning || balloon.dataset.done === "true") {
        return;
      }

      balloon.dataset.done = "true";

      const isCorrect = balloon.dataset.correct === "true";
      const rect = balloon.getBoundingClientRect();

      balloon.classList.add("pop");

      setTimeout(() => {
        balloon.remove();
      }, 250);

      balloonsGoneThisRound++;

      if (isCorrect) {
        totalHits++;
        correctRemainingThisRound--;
        showMessage("Richtig! 🎉", "good");
        dropPokemon(rect.left + rect.width / 2, rect.top + rect.height / 2);
      } else {
        totalErrors++;
        showMessage("Leider leer!", "bad");
      }

      updateStats();
      checkRoundFinished();
    }

    function handleBalloonEscaped(balloon) {
      if (!roundRunning || balloon.dataset.done === "true") {
        return;
      }

      balloon.dataset.done = "true";
      balloon.remove();

      balloonsGoneThisRound++;

      const isCorrect = balloon.dataset.correct === "true";

      if (isCorrect) {
        totalErrors++;
        correctRemainingThisRound--;
        showMessage("Ein richtiger Ballon ist weggeflogen!", "bad");
      }

      updateStats();
      checkRoundFinished();
    }

    function checkRoundFinished() {
      if (balloonsGoneThisRound < BALLOONS_PER_ROUND) {
        return;
      }

      roundRunning = false;

      setTimeout(() => {
        if (currentRound >= totalRounds) {
          showResult();
        } else {
          currentRound++;
          startRound();
        }
      }, 900);
    }

    function showResult() {
      stopRound();

      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      document.getElementById("finalHits").textContent =
        "Richtig: " + totalHits;

      document.getElementById("finalErrors").textContent =
        "Fehler: " + totalErrors;

      let comment = "Gut gemacht!";

      if (totalErrors === 0) {
        comment = "Perfekt! Kein Fehler! 🏆";
      } else if (totalHits >= totalErrors * 2) {
        comment = "Sehr stark! ⭐";
      } else if (totalHits >= totalErrors) {
        comment = "Gut gemacht! Weiter so!";
      } else {
        comment = "Das üben wir einfach nochmal.";
      }

      document.getElementById("finalComment").textContent = comment;
    }

    function dropPokemon(x, y) {
      const pokemonNumber = randomNumber(1, NUMBER_OF_POKEMON);
      const imageUrl = getPokemonImageUrl(pokemonNumber);

      savePokemonToCollection(pokemonNumber);

      const pokemon = document.createElement("img");
      pokemon.className = "pokemon-drop";
      pokemon.src = imageUrl;
      pokemon.alt = "Pokémon Nummer " + padPokemonNumber(pokemonNumber);
      pokemon.style.left = (x - 42) + "px";
      pokemon.style.top = (y - 42) + "px";

      document.getElementById("playfield").appendChild(pokemon);

      setTimeout(() => {
        pokemon.remove();
      }, 1200);
    }

    function showMessage(text, type) {
      const message = document.getElementById("floatingMessage");
      message.textContent = text;
      message.className = "floating-message " + type;

      clearTimeout(showMessage.timeoutId);
      showMessage.timeoutId = setTimeout(clearMessage, 900);
    }

    function clearMessage() {
      const message = document.getElementById("floatingMessage");
      message.textContent = "";
      message.className = "floating-message";
    }

    function updateStats() {
      document.getElementById("roundDisplay").textContent =
        "Runde " + currentRound + " / " + totalRounds;

      document.getElementById("hitDisplay").textContent =
        "Richtig: " + totalHits;

      document.getElementById("errorDisplay").textContent =
        "Fehler: " + totalErrors;
    }

    function padPokemonNumber(pokemonNumber) {
      return String(pokemonNumber).padStart(3, "0");
    }

    function getPokemonImageUrl(pokemonNumber) {
      return "https://db.pokemongohub.net/images/official/full/" +
        padPokemonNumber(pokemonNumber) +
        ".webp";
    }

    function getPokemonCollection() {
      const saved = localStorage.getItem(COLLECTION_STORAGE_KEY);

      if (!saved) {
        return [];
      }

      try {
        const parsed = JSON.parse(saved);

        if (Array.isArray(parsed)) {
          return parsed
            .map(Number)
            .filter(number => Number.isInteger(number) && number >= 1 && number <= NUMBER_OF_POKEMON);
        }

        return [];
      } catch {
        return [];
      }
    }

    function savePokemonToCollection(pokemonNumber) {
      const collection = getPokemonCollection();

      if (!collection.includes(pokemonNumber)) {
        collection.push(pokemonNumber);
        collection.sort((a, b) => a - b);
        localStorage.setItem(COLLECTION_STORAGE_KEY, JSON.stringify(collection));
      }
    }

    function randomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = randomNumber(0, i);
        const temp = array[i];
        array[i] = array[j];
        array[j] = temp;
      }

      return array;
    }

    function goFullscreen() {
      const element = document.documentElement;

      if (element.requestFullscreen) {
        element.requestFullscreen();
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      }
    }
  </script>
</body>
</html>
